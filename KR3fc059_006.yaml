body:
  text: 為法得圓徑草曰立天元一為圓徑以矢减之得為矢徑差又以矢乘之得為一段半弦冪寄左然後以半弦自之得為同數與左相消得上法下實得二百五十步即圓徑也合問今有矢二十五步圓徑二百五十步問弦幾何答曰弦一百五十步術曰以矢减圓徑餘以矢乘之為實開平方得半弦草曰立天元一為半弦自之為半弦冪寄左然後以矢减圓徑餘為矢徑差以矢乘之得為同數與寄左相消得十開平方得七十五步倍之得一百五十步即弦也合問今有弦一百五十步圓徑二百五十步問矢幾何答曰矢二十五步術曰半弦自之為實圓徑為益從一常法開平方得矢草曰立天元一為矢以减圓徑得元為矢徑差又以天元乘之得卜為半弦冪寄左然後以半弦自之得為同數與左相消得開平方
