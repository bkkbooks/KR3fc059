body:
  text: 術曰倍截積自之爲實從空四之截積爲第一廉四之圓徑爲第二廉五虛隅開三乘方得矢草曰立天元一爲矢倍截積得以天元除之得爲矢弦幷以天元减之得下爲弦自之得爲弦冪寄左然後以天元减圓徑二百五十步得爲矢徑差又以天元乘之得又四之得下式爲同數與寄左相消得下式開三乘方得二十五步卽矢也合問弧矢筭術細草
