body:
  text: 爲法得圓徑草曰立天元一爲圓徑以矢减之得爲矢徑差又以矢乘之得爲一段半弦冪寄左然後以半弦自之得爲同數與左相消得上法下實得二百五十步卽圓徑也合問今有矢二十五步圓徑二百五十步問弦幾何荅曰弦一百五十步術曰以矢减圓徑餘以矢乘之爲實開平方得半弦草曰立天元一爲半弦自之爲半弦冪寄左然後以矢减圓徑餘爲矢徑差以矢乘之得爲同數與寄左相消得十開平方得七十五步倍之得一百五十步卽弦也合問今有弦一百五十步圓徑二百五十步問矢幾何荅曰矢二十五步術曰半弦自之爲實圓徑爲益從一常法開平方得矢草曰立天元一爲矢以减圓徑得元爲矢徑差又以天元乘之得卜爲半弦冪寄左然後以半弦自之得爲同數與左相消得開平方
