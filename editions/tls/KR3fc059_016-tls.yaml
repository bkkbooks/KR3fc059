body:
  text: 今有弦一百五十步殘周五百九十五步問矢幾何荅曰矢二十五步術曰半弦冪自乘又三之爲實二數相併又以半弦冪乘之爲益從四之半弦冪爲第一廉二數併爲第二益廉一常法開三乘方得矢草曰立天元一爲矢以弦半之又自之得爲半弦冪以天元除之得爲矢徑差以加天元得爲圓徑自之得下式爲徑冪又三之得爲三段徑冪寄左然後以天元自之又倍之得爲兩矢冪合以圓徑除不除便爲弦背差内寄圓徑爲母又以圓徑乘弦得爲帶分弦以加弦背差得爲帶分弧背又以圓徑乘殘周五百九十五步得下式爲帶分殘周以弧背加之得爲圓周內寄圓徑爲母合以圓徑乘之爲三段徑冪緣此數內已帶有圓徑分母更不須乘便爲同數與左相消得開三乘方得二十五步卽矢也合問今有矢二十五步弦一百五十步問截積幾何荅曰截積二千一百八十七步半術曰以矢加弦又以矢乘之爲實二爲法得截積
