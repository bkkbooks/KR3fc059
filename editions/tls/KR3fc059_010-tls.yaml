body:
  text: 草曰立天元一爲弦以减弧背得爲弦背差又以矢自之又倍之得爲兩段矢冪合以弦背差除之不除便爲圓徑内寄弦背差爲母又以弦背差乘矢得爲帶分矢以減圓徑得爲矢徑差内寄弦母背差爲以矢乘之得又四之得爲弦冪內寄弦背差爲母寄左然後以天元自之爲冪又以分母弦背差乘之得爲同數與寄左相消得益積開立方得一百五十步卽弦也合問今有弦一百五十步弧背一百五十五步問矢幾何荅曰二十五步術曰半之弦自乘又以二數相减餘乘之爲實從空二數相减餘爲益廉二步爲隅開立方得矢草曰立天元一爲矢自之又倍之得爲兩段矢冪合以弦减弧背餘五步爲弦背差除之不除便爲圓徑內寄弦背差爲母又以弦背差乘矢得爲帶分矢以减圓徑餘爲矢徑差內寄弦背差爲母以天元乘之得爲半弦冪內寄弦背寄左差爲母然後以半弦自之得五千六百二十五步又以分母弦背差乘之得爲同數與左相消得
  hash: sha256:0bef6ba10143b68a64e7fec19cc84a4212c155a0decdd5b5e6fa398042131ee0
