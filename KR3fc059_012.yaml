body:
  text: 開立方得二十五步卽矢也合問今有圓徑二百五十步弧背一百五十五步問矢幾何荅曰矢二十五步術曰二數相乘得數又自之爲實圓徑再自之又四之爲益從圓徑自之又四之于上又以二數相乘四之以减上位爲第一廉若不足減反减之餘爲第一益廉第二廉空四步爲隅開三乘方得矢草曰立天元一爲矢自之又倍之得爲兩段矢冪合以圓徑除之不除便爲弦背差內寄圓徑爲母又以圓徑乘弧背得爲帶分弧背以弦背差减之得爲弦內寄圓徑爲母自之得爲弦冪內寄圓徑寄左冪爲母然後以天元减圓徑得下式爲矢徑差又以天元乘之得又四之得下式爲弦冪以分母圓徑冪六萬二千五百步乘之得爲同數與左相消得開三乘方得二十五步卽矢也合問今有矢二十五步殘周五百九十五步問弦幾何荅曰弦一百五十步術曰二之矢冪以矢步乘之又以矢冪乘殘周加
