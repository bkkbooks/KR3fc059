body:
  text: 開立方得二十五步即矢也合問今有圓徑二百五十步弧背一百五十五步問矢幾何答曰矢二十五步術曰二數相乘得數又自之為實圓徑再自之又四之為益從圓徑自之又四之于上又以二數相乘四之以减上位為第一廉若不足減反减之餘為第一益廉第二廉空四步為隅開三乘方得矢草曰立天元一為矢自之又倍之得為兩段矢冪合以圓徑除之不除便為弦背差內寄圓徑為母又以圓徑乘弧背得為帶分弧背以弦背差减之得為弦內寄圓徑為母自之得為弦冪內寄圓徑寄左冪為母然後以天元减圓徑得下式為矢徑差又以天元乘之得又四之得下式為弦冪以分母圓徑冪六萬二千五百步乘之得為同數與左相消得開三乘方得二十五步即矢也合問今有矢二十五步殘周五百九十五步問弦幾何答曰弦一百五十步術曰二之矢冪以矢步乘之又以矢冪乘殘周加
