body:
  text: 得二十五步即矢也合問今有矢二十五步弦一百五十步問弧背幾何答曰弧背一百五十五步術曰倍矢加弦又以矢再乘之于上半弦自之又以弦乘之加上位為實矢冪半弦冪相並為法得弧背草曰立天元一為弧背以弦减之得為弦背差又以矢自之又倍之得為兩段矢冪合以弦背差除之今不受除便以為圓徑內寄弦背差為母又以弦背差乘矢得為帶分矢以减圓徑得為矢徑差內寄弦背差為母以矢乘之得為半弦冪內寄弦背差為母寄左然後以弦半之又自之得為半弦冪又以分母弦背差乘之得為同數與左相消得上法下實得一百五十五步即弧背也合問今有矢二十五步弧背一百五十五步問弦幾何答曰弦一百五十步術曰倍矢减弧背餘以矢冪乘之又四之為實四之矢冪為從弧背為益廉一常法益積開立方得弦
  hash: sha256:43a360dc93baaa5d603fa171265d1ec45da31604b465eb1fe87442253b6d6b3a
