body:
  text: 得二十五步卽矢也合問今有矢二十五步弦一百五十步問弧背幾何荅曰弧背一百五十五步術曰倍矢加弦又以矢再乘之于上半弦自之又以弦乘之加上位爲實矢冪半弦冪相幷爲法得弧背草曰立天元一爲弧背以弦减之得爲弦背差又以矢自之又倍之得爲兩段矢冪合以弦背差除之今不受除便以爲圓徑內寄弦背差爲母又以弦背差乘矢得爲帶分矢以减圓徑得爲矢徑差內寄弦背差爲母以矢乘之得爲半弦冪內寄弦背差爲母寄左然後以弦半之又自之得爲半弦冪又以分母弦背差乘之得爲同數與左相消得上法下實得一百五十五步卽弧背也合問今有矢二十五步弧背一百五十五步問弦幾何荅曰弦一百五十步術曰倍矢减弧背餘以矢冪乘之又四之爲實四之矢冪爲從弧背爲益廉一常法益積開立方得弦
  hash: sha256:04b0183531758b6e0d448ea54f99d0abc73ce6fb06ee185a29e55ae7a9262113
