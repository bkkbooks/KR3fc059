body:
  text: 之于上又以矢步乘之矢冪自之又三之减上位爲實二之矢冪以矢步乘之爲從矢步乘殘周內减六之矢冪爲第一廉若不足减反减之餘爲第一益廉二之矢步爲第二廉三步虛隅益積開三乘方得半弦草曰立天元一爲半弦自之爲半弦冪合以矢除之不除便爲矢徑差內寄矢步爲母以矢自之得爲帶分矢以加矢徑差得爲圓徑內寄矢步爲母自之得爲徑冪內寄矢步爲母三之得爲三段圓徑冪寄左然後以矢自之又倍之得合以圓徑除之緣圓徑內先有矢步分母今不受除更以矢乘之得爲弦背差內寄圓徑爲母圓徑內又寄矢步爲母又倍天元以圓徑乘之得爲帶分弦以弦背差加之得爲帶分弧背又以圓徑乘殘周五百九十五步得爲帶分殘周以加弧背得爲圓周內寄圓徑爲母圓徑內又寄矢步爲母合以圓徑乘之緣此數內已帶有圓徑分母更不須乘便爲三段徑冪又合以分母矢冪乘之緣此數内已帶有矢步分母今只以矢步乘之得爲同數與左相消得開三乘方得七十五步倍之得一百五十步卽弦也合問
