body:
  text: 之于上又以矢步乘之矢冪自之又三之減上位為實二之矢冪以矢步乘之為從矢步乘殘周內減六之矢冪為第一廉若不足減反減之餘為第一益廉二之矢步為第二廉三步虛隅益積開三乘方得半弦草曰立天元一為半弦自之為半弦冪合以矢除之不除便為矢徑差內寄矢步為母以矢自之得為帶分矢以加矢徑差得為圓徑內寄矢步為母自之得為徑冪內寄矢步為母三之得為三段圓徑冪寄左然後以矢自之又倍之得合以圓徑除之緣圓徑內先有矢步分母今不受除更以矢乘之得為弦背差內寄圓徑為母圓徑內又寄矢步為母又倍天元以圓徑乘之得為帶分弦以弦背差加之得為帶分弧背又以圓徑乘殘周五百九十五步得為帶分殘周以加弧背得為圓周內寄圓徑為母圓徑內又寄矢步為母合以圓徑乘之緣此數內已帶有圓徑分母更不須乘便為三段徑冪又合以分母矢冪乘之緣此數內已帶有矢步分母今只以矢步乘之得為同數與左相消得開三乘方得七十五步倍之得一百五十步即弦也合問
