body:
  text: 此術無草今有矢二十五步截積二千一百八十七步半問弦幾何答曰弦一百五十步術曰二之截積內減矢冪為實矢為法得弦草曰立天元一為弦以矢加之得為矢弦並又以矢乘之得寄左然後以截積倍之得為同數與寄左相消得上法下實得一百五十步即弦也合問今有弦一百五十步截積二千一百八十七步半問矢幾何答曰矢二十五步術曰倍截積為實弦為從一步常法開平方得矢草曰立天元一為矢以弦加之得為矢弦並又以矢乘之得元寄左然後以截積倍之得下為同數與左相消得開平方得二十五步即矢也合問今有圓徑二百五十步截積二千一百八十七步半問矢幾何答曰矢二十五步
  hash: sha256:4890ba7cfbceee37631899e7f7db668e509c3eaf30ba27ba7bb12c772ec06b59
