body:
  text: 此術無草今有矢二十五步截積二千一百八十七步半問弦幾何荅曰弦一百五十步術曰二之截積內减矢冪爲實矢爲法得弦草曰立天元一爲弦以矢加之得爲矢弦幷又以矢乘之得寄左然後以截積倍之得爲同數與寄左相消得上法下實得一百五十步卽弦也合問今有弦一百五十步截積二千一百八十七步半問矢幾何荅曰矢二十五步術曰倍截積爲實弦爲從一步常法開平方得矢草曰立天元一爲矢以弦加之得爲矢弦幷又以矢乘之得元寄左然後以截積倍之得下爲同數與左相消得開平方得二十五步卽矢也合問今有圓徑二百五十步截積二千一百八十七步半問矢幾何荅曰矢二十五步
  hash: sha256:990067124460afb91bc679f5d30520d7f719c0a305c3be79edbc4dc2f33d8150
