body:
  text: 今有弦一百五十步殘周五百九十五步問矢幾何答曰矢二十五步術曰半弦冪自乘又三之為實二數相併又以半弦冪乘之為益從四之半弦冪為第一廉二數併為第二益廉一常法開三乘方得矢草曰立天元一為矢以弦半之又自之得為半弦冪以天元除之得為矢徑差以加天元得為圓徑自之得下式為徑冪又三之得為三段徑冪寄左然後以天元自之又倍之得為兩矢冪合以圓徑除不除便為弦背差內寄圓徑為母又以圓徑乘弦得為帶分弦以加弦背差得為帶分弧背又以圓徑乘殘周五百九十五步得下式為帶分殘周以弧背加之得為圓周內寄圓徑為母合以圓徑乘之為三段徑冪緣此數內已帶有圓徑分母更不須乘便為同數與左相消得開三乘方得二十五步即矢也合問今有矢二十五步弦一百五十步問截積幾何答曰截積二千一百八十七步半術曰以矢加弦又以矢乘之為實二為法得截積
  hash: sha256:16aee9c6a9a43a605e699f6fa4c365f07db8a8fdd75b35ee633622154e0114bc
