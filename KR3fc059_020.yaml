body:
  text: 術曰倍截積自之為實從空四之截積為第一廉四之圓徑為第二廉五虛隅開三乘方得矢草曰立天元一為矢倍截積得以天元除之得為矢弦並以天元減之得下為弦自之得為弦冪寄左然後以天元減圓徑二百五十步得為矢徑差又以天元乘之得又四之得下式為同數與寄左相消得下式開三乘方得二十五步即矢也合問弧矢算術細草
