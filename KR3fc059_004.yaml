  text: 弧矢算術細草元和李鋭學弧矢圖式今問正數矢二十五步弦一百五十步圓徑二百五十步弧背一百五十五步殘周五百九十五步截積二千一百八十七步半今有矢二十五步弦一百五十步問圓徑幾何答曰圓徑二百五十步術曰矢自乘于上又以半弦自之加上位為實矢
