body:
  text: 草曰立天元一為弦以减弧背得為弦背差又以矢自之又倍之得為兩段矢冪合以弦背差除之不除便為圓徑內寄弦背差為母又以弦背差乘矢得為帶分矢以減圓徑得為矢徑差內寄弦母背差為以矢乘之得又四之得為弦冪內寄弦背差為母寄左然後以天元自之為冪又以分母弦背差乘之得為同數與寄左相消得益積開立方得一百五十步即弦也合問今有弦一百五十步弧背一百五十五步問矢幾何答曰二十五步術曰半之弦自乘又以二數相减餘乘之為實從空二數相减餘為益廉二步為隅開立方得矢草曰立天元一為矢自之又倍之得為兩段矢冪合以弦减弧背餘五步為弦背差除之不除便為圓徑內寄弦背差為母又以弦背差乘矢得為帶分矢以减圓徑餘為矢徑差內寄弦背差為母以天元乘之得為半弦冪內寄弦背寄左差為母然後以半弦自之得五千六百二十五步又以分母弦背差乘之得為同數與左相消得
  hash: sha256:96e846ef8c217e520aefca34d8c50cb63d9466f6648672f560527568fafb8eee
