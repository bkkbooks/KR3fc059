body:
  text: 草曰立天元一為弦以減弧背得為弦背差又以矢自之又倍之得為兩段矢冪合以弦背差除之不除便為圓徑內寄弦背差為母又以弦背差乘矢得為帶分矢以減圓徑得為矢徑差內寄弦母背差為以矢乘之得又四之得為弦冪內寄弦背差為母寄左然後以天元自之為冪又以分母弦背差乘之得為同數與寄左相消得益積開立方得一百五十步即弦也合問今有弦一百五十步弧背一百五十五步問矢幾何答曰二十五步術曰半之弦自乘又以二數相減餘乘之為實從空二數相減餘為益廉二步為隅開立方得矢草曰立天元一為矢自之又倍之得為兩段矢冪合以弦減弧背餘五步為弦背差除之不除便為圓徑內寄弦背差為母又以弦背差乘矢得為帶分矢以減圓徑餘為矢徑差內寄弦背差為母以天元乘之得為半弦冪內寄弦背寄左差為母然後以半弦自之得五千六百二十五步又以分母弦背差乘之得為同數與左相消得
  hash: sha256:2c1f4591cbdef0a99f826a229afae1ff90f78b5096a0982534efef3ba9ffa2f8
